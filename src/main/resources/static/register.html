<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>注册 - 银幕记忆</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="register-page">
  <div class="register-card">
    <div class="register-header">
      <h1 class="register-title">创建账号</h1>
      <p class="register-subtitle">加入银幕记忆，记录你的电影时光</p>
    </div>

    <div id="errorMessage" class="error-message"></div>

    <form id="registerForm">
      <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" id="username" class="form-input" placeholder="4-20位字母、数字或下划线" required>
        <span class="form-hint">4-20个字符，支持字母、数字、下划线</span>
      </div>

      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" id="password" class="form-input" placeholder="6-32位字符" required>
        <div class="password-strength">
          <div class="password-strength-bar" id="strengthBar"></div>
        </div>
        <span class="form-hint password-strength-text" id="strengthText">请输入密码</span>
      </div>

      <div class="form-group">
        <label class="form-label">确认密码</label>
        <input type="password" id="confirmPassword" class="form-input" placeholder="请再次输入密码" required>
      </div>

      <div class="form-group">
        <label class="form-label">邮箱</label>
        <input type="email" id="email" class="form-input" placeholder="用于密码找回" required>
      </div>

      <button type="submit" id="registerBtn" class="btn btn-primary btn-block">注册</button>
    </form>

    <div class="register-footer">
      已有账号？ <a href="index.html">立即登录</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script>
  const form = document.getElementById('registerForm');
  const errorDiv = document.getElementById('errorMessage');
  const registerBtn = document.getElementById('registerBtn');
  const passwordInput = document.getElementById('password');

  // 密码强度检测
  function checkPasswordStrength(password) {
    let strength = 0;
    if (password.length >= 8) strength++;
    if (password.match(/[a-z]/)) strength++;
    if (password.match(/[A-Z]/)) strength++;
    if (password.match(/[0-9]/)) strength++;
    if (password.match(/[^a-zA-Z0-9]/)) strength++;

    const bar = document.getElementById('strengthBar');
    const text = document.getElementById('strengthText');

    if (password.length === 0) {
      bar.style.width = '0%';
      bar.style.background = '';
      text.textContent = '请输入密码';
      return;
    }

    if (strength <= 2) {
      bar.style.width = '33%';
      bar.style.background = '#ef4444';
      text.textContent = '弱密码';
    } else if (strength <= 4) {
      bar.style.width = '66%';
      bar.style.background = '#f59e0b';
      text.textContent = '中等密码';
    } else {
      bar.style.width = '100%';
      bar.style.background = '#10b981';
      text.textContent = '强密码';
    }
  }

  passwordInput.addEventListener('input', (e) => {
    checkPasswordStrength(e.target.value);
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const username = document.getElementById('username').value.trim();
    const password = passwordInput.value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    const email = document.getElementById('email').value.trim();

    // 验证用户名
    const usernameRegex = /^[a-zA-Z0-9_]{4,20}$/;
    if (!usernameRegex.test(username)) {
      errorDiv.textContent = '用户名必须为4-20位字母、数字或下划线';
      errorDiv.style.display = 'block';
      return;
    }

    // 验证密码
    if (password.length < 6 || password.length > 32) {
      errorDiv.textContent = '密码长度必须为6-32位';
      errorDiv.style.display = 'block';
      return;
    }

    // 验证密码一致性
    if (password !== confirmPassword) {
      errorDiv.textContent = '两次输入的密码不一致';
      errorDiv.style.display = 'block';
      return;
    }

    // 验证邮箱
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
      errorDiv.textContent = '请输入有效的邮箱地址';
      errorDiv.style.display = 'block';
      return;
    }

    registerBtn.disabled = true;
    registerBtn.innerHTML = '<span class="spinner"></span> 注册中...';

    try {
      const result = await userAPI.register(username, password, email);

      if (result.code === 200) {
        showToast('注册成功！正在跳转到登录页...', 'success');
        setTimeout(() => {
          window.location.href = 'index.html';
        }, 1500);
      } else {
        errorDiv.textContent = result.message || '注册失败';
        errorDiv.style.display = 'block';
        registerBtn.disabled = false;
        registerBtn.innerHTML = '注册';
      }
    } catch (error) {
      console.error('注册错误:', error);
      errorDiv.textContent = '网络错误，请检查后端服务是否启动';
      errorDiv.style.display = 'block';
      registerBtn.disabled = false;
      registerBtn.innerHTML = '注册';
    }
  });

  // 输入时隐藏错误
  ['username', 'password', 'confirmPassword', 'email'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
      errorDiv.style.display = 'none';
    });
  });
</script>
</body>
</html>
