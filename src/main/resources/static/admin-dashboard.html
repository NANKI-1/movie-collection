<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>管理员仪表盘 - 银幕记忆</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    .admin-nav {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 12px 24px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      box-shadow: var(--shadow-sm);
    }
    .admin-nav h2 {
      font-size: 1.25rem;
      margin: 0;
    }
    .admin-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .admin-tab {
      padding: 8px 20px;
      background: var(--gray-100);
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.2s;
    }
    .admin-tab.active {
      background: var(--primary);
      color: white;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 20px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }
    .stat-number {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
    }
    .stat-label {
      color: var(--gray-500);
      margin-top: 8px;
    }
    .data-table {
      background: var(--white);
      border-radius: var(--radius-lg);
      overflow-x: auto;
      box-shadow: var(--shadow-sm);
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid var(--gray-200);
    }
    th {
      background: var(--gray-100);
      font-weight: 600;
    }
    .btn-danger {
      background: var(--danger);
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .btn-warning {
      background: #f59e0b;
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .btn-success {
      background: var(--success);
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
    }
    .status-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 12px;
    }
    .status-normal {
      background: #d1fae5;
      color: #059669;
    }
    .status-disabled {
      background: #fee2e2;
      color: #dc2626;
    }
    .confirm-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .confirm-modal.show {
      display: flex;
    }
    .confirm-modal-content {
      background: white;
      border-radius: var(--radius-lg);
      padding: 24px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="admin-container">
  <div class="admin-nav">
    <h2>🎬 银幕记忆 - 管理后台</h2>
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="dashboard">📊 仪表盘</button>
      <button class="admin-tab" data-tab="users">👥 用户管理</button>
      <button class="admin-tab" data-tab="movies">🎬 电影管理</button>
      <button class="admin-tab" data-tab="comments">💬 评论管理</button>
    </div>
    <button class="btn btn-secondary" id="logoutBtn">退出登录</button>
  </div>

  <!-- 仪表盘视图 -->
  <div id="dashboardView" class="tab-view">
    <div class="stats-grid" id="statsGrid"></div>
    <div class="data-table">
      <h3 style="padding: 16px; margin: 0;">近7天数据趋势</h3>
      <canvas id="trendChart" width="800" height="300" style="max-width: 100%; padding: 16px;"></canvas>
    </div>
  </div>

  <!-- 用户管理视图 -->
  <div id="usersView" class="tab-view" style="display: none;">
    <div class="data-table">
      <table>
        <thead>
        <tr><th>ID</th><th>用户名</th><th>邮箱</th><th>注册时间</th><th>收藏数</th><th>评论数</th><th>状态</th><th>操作</th></tr>
        </thead>
        <tbody id="usersTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 电影管理视图 -->
  <div id="moviesView" class="tab-view" style="display: none;">
    <div class="data-table">
      <table>
        <thead>
        <tr><th>ID</th><th>电影名称</th><th>导演</th><th>年份</th><th>类型</th><th>评分</th><th>评论数</th><th>收藏数</th><th>操作</th></tr>
        </thead>
        <tbody id="moviesTableBody"></tbody>
      </table>
    </div>
  </div>

  <!-- 评论管理视图 -->
  <div id="commentsView" class="tab-view" style="display: none;">
    <div class="data-table">
      <table>
        <thead>
        <tr><th>ID</th><th>用户</th><th>电影</th><th>评分</th><th>内容</th><th>时间</th><th>操作</th></tr>
        </thead>
        <tbody id="commentsTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- 确认模态框 -->
<div id="confirmModal" class="confirm-modal">
  <div class="confirm-modal-content">
    <h3>确认操作</h3>
    <p id="confirmMessage">确定要执行此操作吗？</p>
    <div style="display: flex; gap: 12px; justify-content: center; margin-top: 20px;">
      <button class="btn btn-secondary" id="confirmCancelBtn">取消</button>
      <button class="btn btn-danger" id="confirmOkBtn">确认</button>
    </div>
  </div>
</div>

<script src="js/common.js"></script>
<script>
  const API_BASE_URL = window.location.origin;
  let currentTab = 'dashboard';
  let pendingAction = null;

  // 检查登录状态
  async function checkAuth() {
    try {
      const response = await fetch(`${API_BASE_URL}/admin/check`);
      const result = await response.json();
      if (!result.data) {
        window.location.href = 'admin-login.html';
      }
    } catch (error) {
      window.location.href = 'admin-login.html';
    }
  }

  // 加载仪表盘数据
  async function loadDashboard() {
    try {
      const response = await fetch(`${API_BASE_URL}/admin/dashboard`);
      const result = await response.json();
      if (result.code === 200 && result.data) {
        const stats = result.data;
        document.getElementById('statsGrid').innerHTML = `
                    <div class="stat-card"><div class="stat-number">${stats.userCount || 0}</div><div class="stat-label">总用户数</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.movieCount || 0}</div><div class="stat-label">总电影数</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.commentCount || 0}</div><div class="stat-label">总评论数</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.collectionCount || 0}</div><div class="stat-label">总收藏数</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.todayNewUsers || 0}</div><div class="stat-label">今日新增用户</div></div>
                    <div class="stat-card"><div class="stat-number">${stats.todayNewComments || 0}</div><div class="stat-label">今日新增评论</div></div>
                `;
      }
    } catch (error) {
      showToast('加载失败', 'error');
    }
  }

  // 加载用户列表
  async function loadUsers() {
    try {
      const response = await fetch(`${API_BASE_URL}/admin/users`);
      const result = await response.json();
      if (result.code === 200 && result.data) {
        const users = result.data;
        document.getElementById('usersTableBody').innerHTML = users.map(user => `
                    <tr>
                        <td>${user.userId}</td>
                        <td>${escapeHtml(user.username)}</td>
                        <td>${escapeHtml(user.email)}</td>
                        <td>${user.createTime ? new Date(user.createTime).toLocaleDateString() : '-'}</td>
                        <td>${user.movieCount || 0}</td>
                        <td>${user.commentCount || 0}</td>
                        <td><span class="status-badge status-normal">正常</span></td>
                        <td>
                            <button class="btn-danger" onclick="deleteUser(${user.userId})">删除</button>
                        </td>
                    </tr>
                `).join('');
      }
    } catch (error) {
      showToast('加载失败', 'error');
    }
  }

  // 加载电影列表
  async function loadMovies() {
    try {
      const response = await fetch(`${API_BASE_URL}/admin/movies`);
      const result = await response.json();
      if (result.code === 200 && result.data) {
        const movies = result.data;
        document.getElementById('moviesTableBody').innerHTML = movies.map(movie => `
                    <tr>
                        <td>${movie.movieId}</td>
                        <td>${escapeHtml(movie.movieName)}</td>
                        <td>${escapeHtml(movie.director || '-')}</td>
                        <td>${movie.year || '-'}</td>
                        <td>${escapeHtml(movie.genre || '-')}</td>
                        <td>${movie.avgRating ? movie.avgRating.toFixed(1) : '-'}</td>
                        <td>${movie.commentCount || 0}</td>
                        <td>${movie.collectionCount || 0}</td>
                        <td>
                            <button class="btn-danger" onclick="deleteMovie(${movie.movieId})">删除</button>
                        </td>
                    </tr>
                `).join('');
      }
    } catch (error) {
      showToast('加载失败', 'error');
    }
  }

  // 加载评论列表
  async function loadComments() {
    try {
      const response = await fetch(`${API_BASE_URL}/admin/comments`);
      const result = await response.json();
      if (result.code === 200 && result.data) {
        const comments = result.data;
        document.getElementById('commentsTableBody').innerHTML = comments.map(comment => `
                    <tr>
                        <td>${comment.commentId}</td>
                        <td>${escapeHtml(comment.username)}</td>
                        <td>${escapeHtml(comment.movieName)}</td>
                        <td>${'⭐'.repeat(Math.floor(comment.rating))}</td>
                        <td style="max-width: 300px; overflow: hidden; text-overflow: ellipsis;">${escapeHtml(comment.content)}</td>
                        <td>${comment.createTime ? new Date(comment.createTime).toLocaleString() : '-'}</td>
                        <td>
                            <button class="btn-danger" onclick="deleteComment(${comment.commentId})">删除</button>
                        </td>
                    </tr>
                `).join('');
      }
    } catch (error) {
      showToast('加载失败', 'error');
    }
  }

  // 删除用户
  window.deleteUser = function(userId) {
    showConfirm('确定要删除该用户吗？此操作不可恢复。', async () => {
      const response = await fetch(`${API_BASE_URL}/admin/user/${userId}`, { method: 'DELETE' });
      const result = await response.json();
      if (result.code === 200) {
        showToast('删除成功', 'success');
        loadUsers();
      } else {
        showToast(result.message, 'error');
      }
    });
  };

  // 删除电影
  window.deleteMovie = function(movieId) {
    showConfirm('确定要删除该电影吗？关联的收藏和评论也会被删除。', async () => {
      const response = await fetch(`${API_BASE_URL}/admin/movie/${movieId}`, { method: 'DELETE' });
      const result = await response.json();
      if (result.code === 200) {
        showToast('删除成功', 'success');
        loadMovies();
      } else {
        showToast(result.message, 'error');
      }
    });
  };

  // 删除评论
  window.deleteComment = function(commentId) {
    showConfirm('确定要删除该评论吗？', async () => {
      const response = await fetch(`${API_BASE_URL}/admin/comment/${commentId}`, { method: 'DELETE' });
      const result = await response.json();
      if (result.code === 200) {
        showToast('删除成功', 'success');
        loadComments();
      } else {
        showToast(result.message, 'error');
      }
    });
  };

  // 确认对话框
  function showConfirm(message, onConfirm) {
    const modal = document.getElementById('confirmModal');
    document.getElementById('confirmMessage').textContent = message;
    modal.classList.add('show');

    const confirmBtn = document.getElementById('confirmOkBtn');
    const cancelBtn = document.getElementById('confirmCancelBtn');

    const handleConfirm = () => {
      onConfirm();
      modal.classList.remove('show');
      cleanup();
    };
    const handleCancel = () => {
      modal.classList.remove('show');
      cleanup();
    };
    const cleanup = () => {
      confirmBtn.removeEventListener('click', handleConfirm);
      cancelBtn.removeEventListener('click', handleCancel);
    };

    confirmBtn.addEventListener('click', handleConfirm);
    cancelBtn.addEventListener('click', handleCancel);
  }

  // 退出登录
  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch(`${API_BASE_URL}/admin/logout`, { method: 'POST' });
    window.location.href = 'admin-login.html';
  });

  // 标签页切换
  document.querySelectorAll('.admin-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTab = tab.dataset.tab;

      document.querySelectorAll('.tab-view').forEach(view => view.style.display = 'none');
      document.getElementById(`${currentTab}View`).style.display = 'block';

      if (currentTab === 'dashboard') loadDashboard();
      else if (currentTab === 'users') loadUsers();
      else if (currentTab === 'movies') loadMovies();
      else if (currentTab === 'comments') loadComments();
    });
  });

  // 初始化
  checkAuth();
  loadDashboard();
</script>
</body>
</html>
