<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>我的电影收藏 - 银幕记忆</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 合并后的专用样式 */
    .dashboard-layout {
      display: flex;
      gap: 24px;
    }

    /* 左侧文件夹侧边栏 */
    .categories-sidebar {
      width: 260px;
      flex-shrink: 0;
      position: sticky;
      top: 80px;
      height: fit-content;
    }

    .categories-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .categories-header h3 {
      font-size: 1rem;
      margin: 0;
    }

    .category-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .category-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s;
      background: var(--white);
    }

    .category-item:hover {
      background: var(--gray-100);
    }

    .category-item.active {
      background: var(--primary-light);
      color: var(--primary);
      font-weight: 500;
    }

    .category-name {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      font-size: 0.9rem;
    }

    .category-count {
      background: var(--gray-200);
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      margin-left: 8px;
    }

    .category-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .category-item:hover .category-actions {
      opacity: 1;
    }

    .category-edit-btn,
    .category-delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 6px;
      border-radius: var(--radius-sm);
      transition: all 0.2s;
    }

    .category-edit-btn:hover {
      background: var(--gray-200);
    }

    .category-delete-btn:hover {
      background: #fee2e2;
      color: var(--danger);
    }

    /* 右侧主内容区 */
    .main-content {
      flex: 1;
      min-width: 0;
    }

    /* 批量操作栏 */
    .batch-actions {
      background: var(--white);
      border-radius: var(--radius-lg);
      padding: 12px 20px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      box-shadow: var(--shadow-sm);
    }

    .batch-actions-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .select-all-checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.875rem;
    }

    .batch-actions-right {
      display: flex;
      gap: 12px;
    }

    .movie-card {
      position: relative;
      cursor: pointer;
    }

    .movie-card.selected {
      border: 2px solid var(--primary);
      box-shadow: 0 0 0 2px var(--primary-light);
    }

    .movie-checkbox {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 28px;
      height: 28px;
      background: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }

    .movie-checkbox input {
      width: 18px;
      height: 18px;
      cursor: pointer;
    }

    /* 移动菜单样式 */
    .move-category-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .move-category-item {
      padding: 12px 16px;
      cursor: pointer;
      border-radius: var(--radius-sm);
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .move-category-item:hover {
      background: var(--gray-100);
    }

    /* 添加电影按钮区域 */
    .header-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .header-actions h2 {
      margin: 0;
    }

    .header-buttons {
      display: flex;
      gap: 12px;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .dashboard-layout {
        flex-direction: column;
      }
      .categories-sidebar {
        width: 100%;
        position: static;
      }
      .category-actions {
        opacity: 1;
      }
      .batch-actions {
        flex-direction: column;
        align-items: stretch;
      }
      .batch-actions-right {
        justify-content: flex-end;
      }
      .header-actions {
        flex-direction: column;
        align-items: stretch;
      }
      .header-buttons {
        justify-content: flex-end;
      }
    }
  </style>
</head>

<script>
  // ========== 全局变量 ==========
  let currentMovies = [];
  let currentPage = 1;
  let pageSize = 12;
  let deleteTargetId = null;
  let currentRating = 0;
  let filtersVisible = false;
  let allMovies = [];

  // 文件夹相关
  let currentCategoryId = null;
  let categories = [];
  let selectedCollectionIds = new Set();
  let batchMode = false;
  let pendingMoveCollectionIds = [];
  let editingCategoryId = null;

  // ========== 初始化 ==========
  document.addEventListener('DOMContentLoaded', async () => {
    const user = getCurrentUser();
    if (!user) {
      sessionStorage.setItem('redirectAfterLogin', window.location.href);
      window.location.href = 'login.html';
      return;
    }
    document.getElementById('username').textContent = user.username || '用户';

    initRatingStars();
    await loadCategories();
    await loadMovies();
    bindEvents();
  });

  // ========== 评分星星组件 ==========
  function initRatingStars() {
    const container = document.getElementById('ratingStars');
    if (!container) return;
    container.innerHTML = '';
    currentRating = 0;

    for (let i = 1; i <= 5; i++) {
      const star = document.createElement('span');
      star.className = 'star';
      star.setAttribute('data-value', i);
      star.innerHTML = '★';
      star.style.fontSize = '32px';
      star.style.cursor = 'pointer';
      star.style.display = 'inline-block';
      star.style.position = 'relative';

      updateStarDisplay(star, i, currentRating);

      star.onclick = (function(starValue) {
        return function(e) {
          const rect = this.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const starWidth = rect.width;
          const isHalf = mouseX < starWidth / 2;
          let newRating = starValue;
          if (isHalf) {
            newRating = starValue - 0.5;
            if (newRating < 0) newRating = 0;
          }
          setRating(newRating);
        };
      })(i);

      star.onmousemove = (function(starValue) {
        return function(e) {
          const rect = this.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const starWidth = rect.width;
          const isHalf = mouseX < starWidth / 2;
          const previewValue = isHalf ? starValue - 0.5 : starValue;
          previewRating(previewValue);
        };
      })(i);

      star.onmouseleave = () => resetStarsDisplay();
      container.appendChild(star);
    }

    if (!document.getElementById('ratingValueDisplay')) {
      const ratingDisplay = document.createElement('div');
      ratingDisplay.id = 'ratingValueDisplay';
      ratingDisplay.className = 'rating-value-display';
      ratingDisplay.innerHTML = '当前评分：<span id="currentRatingDisplay">0</span> 分';
      container.parentNode.appendChild(ratingDisplay);
    }
  }

  function updateStarDisplay(star, starValue, rating) {
    star.classList.remove('half-star');
    star.style.color = '';
    if (rating >= starValue) {
      star.style.color = '#fbbf24';
    } else if (rating >= starValue - 0.5) {
      star.classList.add('half-star');
      star.style.color = '#d1d5db';
    } else {
      star.style.color = '#d1d5db';
    }
  }

  function previewRating(previewValue) {
    const allStars = document.querySelectorAll('#ratingStars .star');
    allStars.forEach((star, index) => {
      const starValue = index + 1;
      star.classList.remove('half-star');
      if (previewValue >= starValue) {
        star.style.color = '#fbbf24';
      } else if (previewValue >= starValue - 0.5) {
        star.classList.add('half-star');
        star.style.color = '#d1d5db';
      } else {
        star.style.color = '#d1d5db';
      }
    });
    const ratingDisplay = document.getElementById('currentRatingDisplay');
    if (ratingDisplay) {
      ratingDisplay.textContent = previewValue.toFixed(1);
      ratingDisplay.style.color = '#f59e0b';
    }
  }

  function resetStarsDisplay() {
    const allStars = document.querySelectorAll('#ratingStars .star');
    allStars.forEach((star, index) => {
      const starValue = index + 1;
      updateStarDisplay(star, starValue, currentRating);
    });
    const ratingDisplay = document.getElementById('currentRatingDisplay');
    if (ratingDisplay) {
      ratingDisplay.textContent = currentRating.toFixed(1);
      ratingDisplay.style.color = '';
    }
  }

  function setRating(value) {

    document.getElementById('personalRating').value = value;

      ratingDisplay.textContent = currentRating.toFixed(1);

  function updateRatingStarsDisplay() {
    const allStars = document.querySelectorAll('#ratingStars .star');
    allStars.forEach((star, index) => {
      const starValue = index + 1;

  async function loadMoviesByCategory() {

      currentPage = 1;

    } else {
      try {
        const result = await movieAPI.getMoviesByCategory(currentCategoryId);
        console.log('按文件夹查询响应:', result);

        if (result.code === 200 && result.data) {
          movies = Array.isArray(result.data) ? result.data : [];
        } else if (result.data && Array.isArray(result.data)) {
          movies = result.data;

        }

    if (pendingMoveCollectionIds.length === 0) return;

    try {
      const result = await movieAPI.batchMoveToCategory(pendingMoveCollectionIds, targetCategoryId);
      const isSuccess = result.code === 200 || result.code === 2000 || result.success === true;

      if (isSuccess) {
        showToast(`成功移动 ${pendingMoveCollectionIds.length} 部电影`, 'success');
        exitBatchMode();
        await forceRefresh();  // 使用 forceRefresh
      } else {
        showToast(result.message || '移动失败', 'error');
      }
    } catch (error) {
      console.error('批量移动失败:', error);
      showToast('移动失败，请检查网络', 'error');

  async function batchDeleteMovies() {
    if (selectedCollectionIds.size === 0) return;
    if (!confirm(`确定要删除 ${selectedCollectionIds.size} 部电影吗？此操作不可恢复。`)) return;

    let successCount = 0;
    let failCount = 0;

    for (const collectionId of selectedCollectionIds) {
      try {
        const result = await movieAPI.deleteMovie(collectionId);
        if (result.code === 200) {
          successCount++;
        } else {
          failCount++;
        }
      } catch (error) {
        failCount++;
      }
    }

    showToast(`删除完成：成功 ${successCount} 项，失败 ${failCount} 项`, successCount > 0 ? 'success' : 'error');
    exitBatchMode();
    await loadMoviesByCategory();
    await loadCategories();
  }

                e.target.tagName === 'BUTTON' ||

    const totalPages = Math.ceil(currentMovies.length / pageSize);

  async function applyFilters() {
    const params = {
      director: document.getElementById('filterDirector')?.value || '',
      minRating: document.getElementById('filterRating')?.value || '',
      region: document.getElementById('filterRegion')?.value || '',
      genre: document.getElementById('filterGenre')?.value || '',
      categoryId: currentCategoryId,
      // 新增参数
      watchStatus: document.getElementById('filterWatchStatus')?.value || '',
      yearRange: document.getElementById('filterYearRange')?.value || '',
      sortBy: document.getElementById('filterSortBy')?.value || ''
    };

    // 过滤空值
    Object.keys(params).forEach(key => {
      if (!params[key] || params[key] === '全部' || params[key] === '') {
        delete params[key];
      }
    });

    // 如果有年份区间参数，转换为年份范围
    if (params.yearRange) {
      const [startYear, endYear] = params.yearRange.split('-');
      if (startYear && endYear) {
        params.minYear = parseInt(startYear);
        params.maxYear = parseInt(endYear);
      } else if (params.yearRange === '-1970') {
        params.maxYear = 1969;
      }
      delete params.yearRange;
    }

    // 如果有排序参数
    if (params.sortBy) {
      // 排序参数需要后端支持，或者前端排序
      // 这里先传给后端，如果后端不支持，可以在前端排序
      // delete params.sortBy; // 如果后端不支持，取消注释
    }

    console.log('筛选参数:', params);

    try {
      const result = await movieAPI.searchMovies(params);
      if (result.code === 200) {
        currentMovies = result.data || [];

        // 如果后端不支持排序，前端进行排序
        if (params.sortBy && currentMovies.length > 0) {
          currentMovies = sortMoviesFrontend(currentMovies, params.sortBy);
        }

        currentPage = 1;
        renderMovies();
      } else {
        showToast(result.message, 'error');
      }
    } catch (error) {
      console.error('筛选失败:', error);
      showToast('筛选失败', 'error');
    }
  }

  // 前端排序函数（如果后端不支持排序）
  function sortMoviesFrontend(movies, sortBy) {
    const sorted = [...movies];
    switch(sortBy) {
      case 'create_time_desc':
        sorted.sort((a, b) => new Date(b.createTime) - new Date(a.createTime));
        break;
      case 'create_time_asc':
        sorted.sort((a, b) => new Date(a.createTime) - new Date(b.createTime));
        break;
      case 'personal_rating_desc':
        sorted.sort((a, b) => (b.personalRating || 0) - (a.personalRating || 0));
        break;
      case 'personal_rating_asc':
        sorted.sort((a, b) => (a.personalRating || 0) - (b.personalRating || 0));
        break;
      case 'year_desc':
        sorted.sort((a, b) => (b.year || 0) - (a.year || 0));
        break;
      case 'year_asc':
        sorted.sort((a, b) => (a.year || 0) - (b.year || 0));
        break;
      case 'movie_name_asc':
        sorted.sort((a, b) => (a.movieName || '').localeCompare(b.movieName || ''));
        break;
      case 'movie_name_desc':
        sorted.sort((a, b) => (b.movieName || '').localeCompare(a.movieName || ''));
        break;
      default:
        break;
    }
    return sorted;
  }

  function resetFilters() {
    document.getElementById('searchKeyword').value = '';
    document.getElementById('filterDirector').value = '';
    document.getElementById('filterRating').value = '';
    document.getElementById('filterRegion').value = '';
    document.getElementById('filterGenre').value = '';
    document.getElementById('filterWatchStatus').value = '';
    document.getElementById('filterYearRange').value = '';
    document.getElementById('filterSortBy').value = '';
    loadMovies();
  }

  function toggleAdvancedFilters() {
    filtersVisible = !filtersVisible;
    document.getElementById('advancedFilters').style.display = filtersVisible ? 'block' : 'none';
    document.getElementById('toggleFiltersBtn').textContent = filtersVisible ? '收起筛选' : '高级筛选';
  }

  // ========== 模态框操作 ==========
  function openAddMovieModal() {
    document.getElementById('modalTitle').textContent = '添加电影';
    document.getElementById('movieForm').reset();
    document.getElementById('editCollectionId').value = '';
    currentRating = 0;
    updateRatingStarsDisplay();
    loadCategoryOptions();
    document.getElementById('movieModal').classList.add('show');
  }

  function openEditMovieModal(collectionId) {
    const movie = currentMovies.find(m => m.collectionId === collectionId);
    if (!movie) return;

    // 设置模态框标题
    document.getElementById('modalTitle').textContent = '编辑电影记录';

    // 存储当前编辑的收藏ID
    document.getElementById('editCollectionId').value = movie.collectionId;

    // ========== 显示电影基本信息（只读） ==========
    // 海报
    const displayPoster = document.getElementById('displayPoster');
    displayPoster.src = movie.posterUrl || 'https://via.placeholder.com/80x120?text=No+Poster';
    displayPoster.onerror = function() {
      this.src = 'https://via.placeholder.com/80x120?text=No+Poster';
    };

    // 电影名称
    document.getElementById('displayMovieName').textContent = movie.movieName || '未知';

    // 导演
    document.getElementById('displayDirector').textContent = movie.director || '未知';

    // 年份
    document.getElementById('displayYear').textContent = movie.year || '未知';

    // 地区
    document.getElementById('displayRegion').textContent = movie.region || '未知';

    // 类型
    document.getElementById('displayGenre').textContent = movie.genre || '未知';

    // ========== 设置用户可编辑的个人信息 ==========
    // 观影状态
    document.getElementById('watchStatus').value = movie.watchStatus || '想看';

    // 私人笔记
    document.getElementById('privateReview').value = movie.privateReview || '';

    // 个人评分（星星组件）
    currentRating = movie.personalRating || 0;
    updateRatingStarsDisplay();  // 更新星星显示

    // 显示模态框
    document.getElementById('movieModal').classList.add('show');
  }

  function closeMovieModal() {
    document.getElementById('movieModal').classList.remove('show');
  }

  async function saveMovie() {
    const collectionId = document.getElementById('editCollectionId').value;

    // 只提交用户可修改的字段
    const movieData = {
      personalRating: currentRating,           // 个人评分
      watchStatus: document.getElementById('watchStatus').value,  // 观影状态
      privateReview: document.getElementById('privateReview').value  // 私人笔记
    };

    // 验证：如果有评分但未选择状态，可以给个提示
    if (movieData.personalRating > 0 && !movieData.watchStatus) {
      movieData.watchStatus = '想看';
    }

    try {
      let result;
      if (collectionId) {
        result = await movieAPI.updateMovie(collectionId, movieData);
      } else {
        result = await movieAPI.addMovie(movieData);
      }
      if (result.code === 200) {
        showToast('保存成功', 'success');
        closeMovieModal();
        await forceRefresh();  // 刷新列表
        await loadCategories();  // 刷新分类统计
      } else {
        showToast(result.message || '保存失败', 'error');
      }
    } catch (error) {
      console.error('保存失败:', error);
      showToast('保存失败，请重试', 'error');
    }
  }

  function openDeleteModal(collectionId) {
    deleteTargetId = collectionId;
    document.getElementById('deleteModal').classList.add('show');
  }

  function closeDeleteModal() {
    deleteTargetId = null;
    document.getElementById('deleteModal').classList.remove('show');
  }

  async function confirmDelete() {
    if (!deleteTargetId) return;
    try {
      const result = await movieAPI.deleteMovie(deleteTargetId);
      if (result.code === 200) {
        showToast('删除成功', 'success');
        closeDeleteModal();
        await forceRefresh();  // 使用 forceRefresh
      } else {
        showToast(result.message, 'error');
      }
    } catch (error) {
      showToast('删除失败', 'error');
    }
  }

  // TMDB 搜索
  async function searchTMDB() {
    const keyword = document.getElementById('apiSearchKeyword').value;
    if (!keyword) {
      showToast('请输入电影名称', 'warning');
      return;
    }
    showToast('TMDB功能需要后端实现代理接口', 'info');
    const container = document.getElementById('tmdbResults');
    container.innerHTML = `
      <div style="text-align: center; padding: 20px; color: var(--gray-500);">
        请在后端实现 TMDB API 代理接口<br>
        接口地址: /api/tmdb/search?keyword=${encodeURIComponent(keyword)}
      </div>
    `;
  }

  function switchTab(tab) {
    const manualTab = document.getElementById('manualTab');
    const apiTab = document.getElementById('apiTab');
    const tabBtns = document.querySelectorAll('.tab-btn');
    tabBtns.forEach(btn => {
      btn.classList.remove('active');
      if (btn.dataset.tab === tab) btn.classList.add('active');
    });
    if (tab === 'manual') {
      manualTab.classList.add('active');
      apiTab.classList.remove('active');
    } else {
      manualTab.classList.remove('active');
      apiTab.classList.add('active');
    }
  }

  // ========== 事件绑定 ==========
  function bindEvents() {
    document.getElementById('addMovieBtn')?.addEventListener('click', openAddMovieModal);
    document.getElementById('batchModeBtn')?.addEventListener('click', enterBatchMode);
    document.getElementById('exitBatchModeBtn')?.addEventListener('click', exitBatchMode);
    document.getElementById('batchMoveBtn')?.addEventListener('click', () => {
      if (selectedCollectionIds.size === 0) {
        showToast('请先选择要移动的电影', 'warning');
        return;
      }
      openMoveModal(Array.from(selectedCollectionIds));
    });
    document.getElementById('batchDeleteBtn')?.addEventListener('click', batchDeleteMovies);
    document.getElementById('selectAllCheckbox')?.addEventListener('change', selectAll);
    document.getElementById('searchBtn')?.addEventListener('click', searchMovies);
    document.getElementById('resetFiltersBtn')?.addEventListener('click', resetFilters);
    document.getElementById('applyFiltersBtn')?.addEventListener('click', applyFilters);
    document.getElementById('toggleFiltersBtn')?.addEventListener('click', toggleAdvancedFilters);
    document.getElementById('closeModalBtn')?.addEventListener('click', closeMovieModal);
    document.getElementById('cancelModalBtn')?.addEventListener('click', closeMovieModal);
    document.getElementById('saveMovieBtn')?.addEventListener('click', saveMovie);
    document.getElementById('closeDeleteModalBtn')?.addEventListener('click', closeDeleteModal);
    document.getElementById('cancelDeleteBtn')?.addEventListener('click', closeDeleteModal);
    document.getElementById('confirmDeleteBtn')?.addEventListener('click', confirmDelete);
    document.getElementById('searchTMDBBtn')?.addEventListener('click', searchTMDB);
    document.getElementById('createCategoryBtn')?.addEventListener('click', createCategory);
    document.getElementById('closeMoveModalBtn')?.addEventListener('click', closeMoveModal);
    document.getElementById('closeEditCategoryModalBtn')?.addEventListener('click', closeEditCategoryModal);
    document.getElementById('cancelEditCategoryBtn')?.addEventListener('click', closeEditCategoryModal);
    document.getElementById('confirmEditCategoryBtn')?.addEventListener('click', updateCategory);
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });
  }
</script>
</body>
</html>
