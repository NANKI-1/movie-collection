<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>登录 - 银幕记忆</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-header">
            <div class="brand-icon">🎬</div>
            <h1 class="login-title">银幕记忆</h1>
            <p class="login-subtitle">个人电影收藏管理系统</p>
        </div>
        <div id="errorMessage" class="error-message"></div>
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" id="username" class="form-input" placeholder="请输入用户名" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="password" class="form-input" placeholder="请输入密码" autocomplete="current-password" required>
            </div>
            <button type="submit" id="loginBtn" class="btn btn-primary btn-block">登录</button>
        </form>
        <div class="login-footer">
            还没有账号？ <a href="register.html">立即注册</a>
        </div>
        <div class="login-footer">
            <a href="reset-password.html">忘记密码？</a>
        </div>
        <div class="back-link">
            <a href="index.html">← 返回首页</a>
        </div>
    </div>
</div>
<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script>
    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');

    const redirectUrl = sessionStorage.getItem('redirectAfterLogin') || 'index.html';

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            showToast('请填写用户名和密码', 'error');
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner"></span> 登录中...';

        try {
            console.log('正在登录:', username);
            const result = await userAPI.login(username, password);
            console.log('登录响应:', result);

            if (result.code === 200) {
                localStorage.setItem('token', result.data.token);
                localStorage.setItem('user', JSON.stringify(result.data.user));
                showToast('登录成功！正在跳转...', 'success');
                sessionStorage.removeItem('redirectAfterLogin');
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 500);
            } else {
                // 详细的错误信息处理
                let errorMsg = '';
                let detailMsg = '';

                switch(result.code) {
                    case 401:
                        errorMsg = '用户名或密码错误';
                        if (result.message) {
                            if (result.message.includes('不存在')) {
                                detailMsg = '该用户名未注册';
                            } else if (result.message.includes('密码')) {
                                detailMsg = '密码输入错误';
                            } else {
                                detailMsg = result.message;
                            }
                        }
                        break;
                    case 400:
                        errorMsg = '请求参数错误';
                        detailMsg = result.message || '请检查输入';
                        break;
                    case 500:
                        errorMsg = '服务器内部错误';
                        detailMsg = result.message || '请稍后重试或联系管理员';
                        break;
                    case 404:
                        errorMsg = '接口不存在';
                        detailMsg = '请检查后端服务是否正常运行';
                        break;
                    default:
                        errorMsg = '登录失败';
                        detailMsg = result.message || '未知错误';
                }

                // 显示弹窗提示
                const fullMsg = detailMsg ? `${errorMsg}：${detailMsg}` : errorMsg;
                showToast(fullMsg, 'error');

                // 同时在页面显示
                errorDiv.innerHTML = `<strong>${errorMsg}</strong>${detailMsg ? '<br><small>' + detailMsg + '</small>' : ''}`;
                errorDiv.style.display = 'block';

                loginBtn.disabled = false;
                loginBtn.innerHTML = '登录';
            }
        } catch (error) {
            console.error('登录错误详情:', error);

            let errorMsg = '网络连接失败';
            let detailMsg = '';

            if (error.message) {
                if (error.message.includes('fetch')) {
                    detailMsg = '无法连接到后端服务，请确认后端已启动';
                } else if (error.message.includes('JSON')) {
                    detailMsg = '后端响应格式错误';
                } else {
                    detailMsg = error.message;
                }
            } else {
                detailMsg = '请检查后端服务是否运行在 http://localhost:8080';
            }

            showToast(`${errorMsg}：${detailMsg}`, 'error');
            errorDiv.innerHTML = `<strong>${errorMsg}</strong><br><small>${detailMsg}</small>`;
            errorDiv.style.display = 'block';

            loginBtn.disabled = false;
            loginBtn.innerHTML = '登录';
        }
    });

    document.getElementById('username').addEventListener('input', () => {
        errorDiv.style.display = 'none';
    });
    document.getElementById('password').addEventListener('input', () => {
        errorDiv.style.display = 'none';
    });
</script>
</body>
</html>
