<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>登录 - 银幕记忆</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="login-header">
            <div class="brand-icon">🎬</div>
            <h1 class="login-title">银幕记忆</h1>
            <p class="login-subtitle">个人电影收藏管理系统</p>
        </div>
        <div id="errorMessage" class="error-message"></div>
        <form id="loginForm">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <input type="text" id="username" class="form-input" placeholder="请输入用户名" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" id="password" class="form-input" placeholder="请输入密码" autocomplete="current-password" required>
            </div>
            <button type="submit" id="loginBtn" class="btn btn-primary btn-block">登录</button>
        </form>
        <div class="login-footer">
            还没有账号？ <a href="register.html">立即注册</a>
        </div>
        <div class="back-link">
            <a href="index.html">← 返回首页</a>
        </div>
    </div>
</div>
<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script>
    const form = document.getElementById('loginForm');
    const errorDiv = document.getElementById('errorMessage');
    const loginBtn = document.getElementById('loginBtn');

    // 获取重定向URL
    const redirectUrl = sessionStorage.getItem('redirectAfterLogin') || 'index.html';

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            errorDiv.textContent = '请填写用户名和密码';
            errorDiv.style.display = 'block';
            return;
        }

        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="spinner"></span> 登录中...';

        try {
            const result = await userAPI.login(username, password);
            if (result.code === 200) {
                localStorage.setItem('token', result.data.token);
                localStorage.setItem('user', JSON.stringify(result.data.user));
                showToast('登录成功', 'success');
                // 清除重定向记录
                sessionStorage.removeItem('redirectAfterLogin');
                setTimeout(() => {
                    window.location.href = redirectUrl;
                }, 500);
            } else {
                errorDiv.textContent = result.message || '登录失败';
                errorDiv.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = '登录';
            }
        } catch (error) {
            console.error('登录错误:', error);
            errorDiv.textContent = '网络错误，请检查后端服务是否启动';
            errorDiv.style.display = 'block';
            loginBtn.disabled = false;
            loginBtn.innerHTML = '登录';
        }
    });

    document.getElementById('username').addEventListener('input', () => {
        errorDiv.style.display = 'none';
    });
    document.getElementById('password').addEventListener('input', () => {
        errorDiv.style.display = 'none';
    });
</script>
</body>
</html>
