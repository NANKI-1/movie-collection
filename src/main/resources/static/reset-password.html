<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>找回密码 - 银幕记忆</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .reset-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #eef2f6 100%);
        }
        .reset-card {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 420px;
            padding: 40px;
        }
        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .success-message {
            background: #d1fae5;
            color: #059669;
            padding: 12px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>
<div class="reset-page">
    <div class="reset-card">
        <h1 class="login-title" style="text-align: center; margin-bottom: 24px;">找回密码</h1>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="resetForm">
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <input type="email" id="email" class="form-input" placeholder="请输入注册邮箱" required>
            </div>

            <div class="form-group">
                <label class="form-label">验证码</label>
                <div style="display: flex; gap: 12px;">
                    <input type="text" id="code" class="form-input" placeholder="请输入验证码" required style="flex: 1;">
                    <button type="button" class="btn btn-secondary" id="sendCodeBtn" style="white-space: nowrap;">发送验证码</button>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">新密码</label>
                <input type="password" id="newPassword" class="form-input" placeholder="6-32位字符" required>
            </div>

            <div class="form-group">
                <label class="form-label">确认新密码</label>
                <input type="password" id="confirmPassword" class="form-input" placeholder="请再次输入密码" required>
            </div>

            <button type="submit" class="btn btn-primary btn-block">重置密码</button>
        </form>

        <div class="login-footer">
            <a href="login.html">返回登录</a>
        </div>
    </div>
</div>

<script>
    const API_BASE_URL = window.location.origin;
    let countdown = 60;
    let timer = null;

    // 发送验证码
    document.getElementById('sendCodeBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();

        if (!email) {
            showError('请先填写邮箱');
            return;
        }

        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            showError('请输入有效的邮箱地址');
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/user/send-reset-code?email=${encodeURIComponent(email)}`, {
                method: 'POST'
            });
            const result = await response.json();

            if (result.code === 200) {
                showSuccess('验证码已发送，请查收邮件');
                startCountdown();
            } else {
                showError(result.message);
            }
        } catch (error) {
            showError('发送失败，请稍后重试');
        }
    });

    function startCountdown() {
        const btn = document.getElementById('sendCodeBtn');
        btn.disabled = true;
        timer = setInterval(() => {
            countdown--;
            btn.textContent = `${countdown}秒后重试`;
            if (countdown <= 0) {
                clearInterval(timer);
                btn.disabled = false;
                btn.textContent = '发送验证码';
                countdown = 60;
            }
        }, 1000);
    }

    // 重置密码
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const code = document.getElementById('code').value.trim();
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
            showError('两次输入的密码不一致');
            return;
        }

        if (newPassword.length < 6) {
            showError('密码长度至少6位');
            return;
        }

        try {
            const response = await fetch(`${API_BASE_URL}/user/reset-password`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, code, newPassword })
            });
            const result = await response.json();

            if (result.code === 200) {
                showSuccess('密码重置成功！3秒后跳转到登录页');
                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 3000);
            } else {
                showError(result.message);
            }
        } catch (error) {
            showError('重置失败，请稍后重试');
        }
    });

    function showError(msg) {
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        successDiv.style.display = 'none';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 3000);
    }

    function showSuccess(msg) {
        const errorDiv = document.getElementById('errorMessage');
        const successDiv = document.getElementById('successMessage');
        successDiv.textContent = msg;
        successDiv.style.display = 'block';
        errorDiv.style.display = 'none';
        setTimeout(() => {
            successDiv.style.display = 'none';
        }, 3000);
    }
</script>
</body>
</html>
