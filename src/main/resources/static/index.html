<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>银幕记忆 - 发现电影</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* 收藏模态框额外样式 */
    .collect-modal .modal-content {
      max-width: 550px;
    }
    .collect-rating {
      margin: 16px 0;
    }
    .collect-rating #collectRatingStars {
      display: flex;
      gap: 8px;
      margin: 8px 0;
    }
    .collect-rating .star {
      font-size: 32px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .collect-rating .star:hover {
      transform: scale(1.1);
    }
    .collect-rating-value {
      margin-top: 8px;
      font-size: 14px;
      color: var(--gray-600);
    }
    .form-select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--gray-300);
      border-radius: var(--radius-sm);
      font-size: 0.875rem;
      background: var(--white);
    }
    .form-select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
    }
    .movie-preview {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--gray-200);
    }
    .movie-preview-img {
      width: 80px;
      height: 120px;
      object-fit: cover;
      border-radius: var(--radius-sm);
    }
    .movie-preview-info {
      flex: 1;
    }
    .movie-preview-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .movie-preview-year {
      font-size: 0.8rem;
      color: var(--gray-500);
    }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-container">
    <div class="logo" onclick="window.location.href='index.html'">🎬 银幕记忆</div>
    <div class="nav-menu">
      <a href="top-rated.html">排行榜</a>
      <a href="index.html" class="active">发现电影</a>
      <a href="dashboard.html" id="myCollectionsLink" style="display: none;">我的收藏</a>
      <a href="my-comments.html" id="myCommentsLink" style="display: none;">我的评价</a>
      <a href="profile.html" id="profileLink" style="display: none;">个人资料</a>
    </div>
    <div class="nav-links">
      <div id="userInfoArea" class="user-info">
        <span class="username" id="username"></span>
        <button class="logout-btn" id="loginLogoutBtn" onclick="handleLoginLogout()">登录</button>
      </div>
    </div>
  </div>
</nav>

<div class="container">
  <div class="hero-section">
    <h1 class="hero-title">发现电影的魅力</h1>
    <p class="hero-subtitle">搜索全球电影，查看评分，收藏你的最爱</p>
  </div>

  <div class="search-section">
    <div class="search-row">
      <div class="search-input-group">
        <label>电影名称</label>
        <input type="text" id="searchTitle" placeholder="输入电影名称...">
      </div>
      <div class="search-input-group">
        <label>年份</label>
        <input type="number" id="searchYear" placeholder="上映年份">
      </div>
      <div class="search-input-group">
        <label>类型</label>
        <select id="searchGenre">
          <option value="">全部类型</option>
          <option value="28">动作</option>
          <option value="35">喜剧</option>
          <option value="18">剧情</option>
          <option value="10749">爱情</option>
          <option value="878">科幻</option>
          <option value="27">恐怖</option>
          <option value="53">悬疑</option>
          <option value="16">动画</option>
        </select>
      </div>
    </div>
    <div class="search-actions">
      <button class="btn btn-secondary" id="resetSearchBtn">重置</button>
      <button class="btn btn-primary" id="searchMoviesBtn">🔍 搜索电影</button>
    </div>
  </div>

  <div id="moviesGrid" class="movies-grid"></div>
  <div id="loadingIndicator" class="loading-more" style="display: none;">
    <div class="spinner"></div> 加载中...
  </div>
  <div id="pagination" class="pagination"></div>
</div>

<!-- 登录提示模态框 -->
<div id="loginPromptModal" class="modal login-prompt-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">需要登录</h3>
      <button class="modal-close" id="closePromptModalBtn">&times;</button>
    </div>
    <div class="modal-body">
      <div class="login-prompt-icon">🔐</div>
      <p id="promptMessage">此操作需要登录账号，请先登录</p>
    </div>
    <div class="modal-footer" style="justify-content: center;">
      <button class="btn btn-secondary" id="cancelPromptBtn">暂不登录</button>
      <button class="btn btn-primary" id="confirmLoginBtn">去登录</button>
    </div>
  </div>
</div>

<!-- ✅ 新增：收藏电影模态框（完整版） -->
<div id="collectModal" class="modal collect-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title">收藏电影</h3>
      <button class="modal-close" id="closeCollectModalBtn">&times;</button>
    </div>
    <div class="modal-body">
      <!-- 电影预览 -->
      <div class="movie-preview" id="collectMoviePreview">
        <img id="collectPoster" class="movie-preview-img" src="" alt="电影海报">
        <div class="movie-preview-info">
          <div class="movie-preview-title" id="collectTitle"></div>
          <div class="movie-preview-year" id="collectYear"></div>
        </div>
      </div>

      <form id="collectForm">
        <input type="hidden" id="collectTmdbId">
        <input type="hidden" id="collectMovieName">
        <input type="hidden" id="collectPosterUrl">
        <input type="hidden" id="collectDirector">
        <input type="hidden" id="collectYearValue">
        <input type="hidden" id="collectGenre">
        <input type="hidden" id="collectRegion">

        <!-- 个人评分 -->
        <div class="form-group collect-rating">
          <label class="form-label">我的评分 <span style="font-size: 0.75rem; color: var(--gray-500);">（点击星星评分）</span></label>
          <div id="collectRatingStars"></div>
          <input type="hidden" id="collectPersonalRating" value="0">
          <div class="collect-rating-value" id="collectRatingDisplay">当前评分：0 分</div>
        </div>

        <!-- 观影状态 -->
        <div class="form-group">
          <label class="form-label">观影状态</label>
          <select id="collectWatchStatus" class="form-select">
            <option value="想看">想看</option>
            <option value="已看">已看</option>
            <option value="不感兴趣">不感兴趣</option>
          </select>
        </div>

        <!-- 所属文件夹 -->
        <div class="form-group">
          <label class="form-label">所属文件夹</label>
          <select id="collectCategoryId" class="form-select">
            <option value="">默认收藏</option>
          </select>
        </div>

        <!-- 私人笔记 -->
        <div class="form-group">
          <label class="form-label">私人笔记 <span style="font-size: 0.75rem; color: var(--gray-500);">（仅自己可见）</span></label>
          <textarea id="collectPrivateReview" class="form-textarea"
                    placeholder="写下你的私人观影感受..."
                    rows="3"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cancelCollectBtn">取消</button>
      <button class="btn btn-primary" id="confirmCollectBtn">确认收藏</button>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/common.js"></script>
<script>
  let currentPage = 1;
  let totalPages = 0;
  let isLoading = false;
  let pendingAction = null;
  let pendingMovieData = null;

  // 收藏评分相关变量
  let collectRating = 0;
  let categories = [];

  // TMDB API 配置
  const TMDB_API_KEY = 'b8bd41516966d743a7cbcb3d81dc02c2';
  const TMDB_BASE_URL = 'https://api.themoviedb.org/3';

  // 页面初始化
  document.addEventListener('DOMContentLoaded', () => {
    updateUIByLoginStatus();
    bindEvents();
    searchMovies();
  });

  function updateUIByLoginStatus() {
    const token = localStorage.getItem('token');
    const user = getCurrentUser();

    if (token && user) {
      document.getElementById('username').textContent = user.username || '用户';
      document.getElementById('loginLogoutBtn').textContent = '退出';
      document.getElementById('myCollectionsLink').style.display = 'inline-block';
      document.getElementById('myCommentsLink').style.display = 'inline-block';
      document.getElementById('profileLink').style.display = 'inline-block';
    } else {
      document.getElementById('username').textContent = '';
      document.getElementById('loginLogoutBtn').textContent = '登录';
      document.getElementById('myCollectionsLink').style.display = 'none';
      document.getElementById('myCommentsLink').style.display = 'none';
      document.getElementById('profileLink').style.display = 'none';
    }
  }

  function handleLoginLogout() {
    const token = localStorage.getItem('token');
    if (token) {
      logout();
      updateUIByLoginStatus();
      searchMovies();
    } else {
      window.location.href = 'login.html';
    }
  }

  function bindEvents() {
    document.getElementById('searchMoviesBtn').addEventListener('click', () => {
      currentPage = 1;
      searchMovies();
    });
    document.getElementById('resetSearchBtn').addEventListener('click', () => {
      document.getElementById('searchTitle').value = '';
      document.getElementById('searchYear').value = '';
      document.getElementById('searchGenre').value = '';
      currentPage = 1;
      searchMovies();
    });

    // 登录提示模态框事件
    document.getElementById('closePromptModalBtn').addEventListener('click', closeLoginPrompt);
    document.getElementById('cancelPromptBtn').addEventListener('click', closeLoginPrompt);
    document.getElementById('confirmLoginBtn').addEventListener('click', () => {
      sessionStorage.setItem('redirectAfterLogin', window.location.href);
      sessionStorage.setItem('pendingAction', JSON.stringify(pendingAction));
      sessionStorage.setItem('pendingMovieData', JSON.stringify(pendingMovieData));
      window.location.href = 'login.html';
    });

    // 收藏模态框事件
    document.getElementById('closeCollectModalBtn').addEventListener('click', closeCollectModal);
    document.getElementById('cancelCollectBtn').addEventListener('click', closeCollectModal);
    document.getElementById('confirmCollectBtn').addEventListener('click', confirmCollect);
  }

  function showLoginPrompt(message, action, movieData = null) {
    pendingAction = action;
    pendingMovieData = movieData;
    document.getElementById('promptMessage').textContent = message || '此操作需要登录账号，请先登录';
    document.getElementById('loginPromptModal').classList.add('show');
  }

  function closeLoginPrompt() {
    pendingAction = null;
    pendingMovieData = null;
    document.getElementById('loginPromptModal').classList.remove('show');
  }

  // 搜索电影 (调用TMDB)
  async function searchMovies() {
    if (isLoading) return;
    isLoading = true;
    document.getElementById('loadingIndicator').style.display = 'flex';

    const title = document.getElementById('searchTitle').value;
    const year = document.getElementById('searchYear').value;
    const genre = document.getElementById('searchGenre').value;

    let url;
    if (title) {
      url = `${API_BASE_URL}/tmdb/search/movie?page=${currentPage}&query=${encodeURIComponent(title)}`;
      if (year) url += `&year=${year}`;
      if (genre) url += `&with_genres=${genre}`;
    } else {
      url = `${API_BASE_URL}/tmdb/movie/popular?page=${currentPage}`;
      if (year) url += `&year=${year}`;
      if (genre) url += `&with_genres=${genre}`;
    }

    try {
      const response = await fetch(url);
      const data = await response.json();

      if (data.results) {
        totalPages = data.total_pages > 500 ? 500 : data.total_pages;
        renderMovies(data.results);
        renderPagination();
      } else {
        document.getElementById('moviesGrid').innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎬</div><p>暂无电影数据</p></div>';
      }
    } catch (error) {
      console.error('搜索失败:', error);
      showToast('搜索失败，请检查网络', 'error');
      document.getElementById('moviesGrid').innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>搜索失败，请检查网络连接</p></div>';
    } finally {
      isLoading = false;
      document.getElementById('loadingIndicator').style.display = 'none';
    }
  }

  function renderMovies(movies) {
    const grid = document.getElementById('moviesGrid');
    if (!movies || movies.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🎬</div><p>没有找到相关电影</p></div>';
      return;
    }

    grid.innerHTML = movies.map(movie => `
      <div class="card movie-card" data-movie-id="${movie.id}">
        <img src="${movie.poster_path ? 'https://image.tmdb.org/t/p/w500' + movie.poster_path : 'https://via.placeholder.com/300x450?text=No+Poster'}"
             class="movie-poster"
             alt="${escapeHtml(movie.title)}"
             onerror="this.src='https://via.placeholder.com/300x450?text=No+Poster'">
        <div class="movie-info">
          <h3 class="movie-title">${escapeHtml(movie.title)}</h3>
          <p class="movie-year">${movie.release_date ? movie.release_date.split('-')[0] : '未知'}</p>
          <div class="stars-container">${renderStars(movie.vote_average / 2, 'small')}</div>
          <div style="margin-top: 12px;">
            <button class="btn btn-primary btn-sm view-detail" data-movie='${JSON.stringify(movie)}'>查看详情</button>
            <button class="btn btn-secondary btn-sm collect-movie" data-movie='${JSON.stringify(movie)}'>⭐ 收藏</button>
          </div>
        </div>
      </div>
    `).join('');

    // 绑定卡片点击和按钮事件
    document.querySelectorAll('.movie-card').forEach(card => {
      const viewBtn = card.querySelector('.view-detail');
      const collectBtn = card.querySelector('.collect-movie');
      const movieData = JSON.parse(viewBtn.dataset.movie);

      card.addEventListener('click', (e) => {
        if (e.target.classList.contains('view-detail') || e.target.classList.contains('collect-movie')) return;
        showMovieDetail(movieData);
      });

      viewBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        showMovieDetail(movieData);
      });

      // ✅ 新增：收藏按钮事件
      collectBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const token = localStorage.getItem('token');
        if (!token) {
          showLoginPrompt('收藏电影需要登录，请先登录', { type: 'collect', movieData: movieData });
        } else {
          openCollectModal(movieData);
        }
      });
    });
  }

  function renderPagination() {
    if (totalPages <= 1) {
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    let html = '<div class="pagination-container">';
    html += `<button class="page-btn ${currentPage === 1 ? 'disabled' : ''}" data-page="1" ${currentPage === 1 ? 'disabled' : ''}>首页</button>`;
    html += `<button class="page-btn ${currentPage === 1 ? 'disabled' : ''}" data-page="${currentPage - 1}" ${currentPage === 1 ? 'disabled' : ''}>上一页</button>`;

    let startPage = Math.max(1, currentPage - 3);
    let endPage = Math.min(totalPages, currentPage + 3);

    if (endPage - startPage < 6) {
      if (startPage === 1) {
        endPage = Math.min(totalPages, startPage + 6);
      } else if (endPage === totalPages) {
        startPage = Math.max(1, endPage - 6);
      }
    }

    if (startPage > 1) {
      html += `<span class="page-ellipsis">...</span>`;
    }

    for (let i = startPage; i <= endPage; i++) {
      html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
    }

    if (endPage < totalPages) {
      html += `<span class="page-ellipsis">...</span>`;
    }

    html += `<button class="page-btn ${currentPage === totalPages ? 'disabled' : ''}" data-page="${currentPage + 1}" ${currentPage === totalPages ? 'disabled' : ''}>下一页</button>`;
    html += `<button class="page-btn ${currentPage === totalPages ? 'disabled' : ''}" data-page="${totalPages}" ${currentPage === totalPages ? 'disabled' : ''}>尾页</button>`;

    html += `<div class="page-jump">
                <span>跳转到</span>
                <input type="number" id="jumpPageInput" class="page-jump-input"
                       min="1" max="${totalPages}" value="${currentPage}"
                       style="width: 60px; text-align: center;">
                <span>页</span>
                <button class="page-btn page-jump-btn" id="jumpPageBtn">GO</button>
            </div>`;

    html += '</div>';
    document.getElementById('pagination').innerHTML = html;

    document.querySelectorAll('.page-btn:not(.disabled)').forEach(btn => {
      if (!btn.disabled) {
        btn.addEventListener('click', () => {
          const page = parseInt(btn.dataset.page);
          if (!isNaN(page) && page !== currentPage && page >= 1 && page <= totalPages) {
            currentPage = page;
            searchMovies();
            window.scrollTo({ top: 0, behavior: 'smooth' });
          }
        });
      }
    });

    const jumpBtn = document.getElementById('jumpPageBtn');
    if (jumpBtn) {
      jumpBtn.addEventListener('click', () => {
        const jumpInput = document.getElementById('jumpPageInput');
        let targetPage = parseInt(jumpInput.value);
        if (isNaN(targetPage)) targetPage = 1;
        targetPage = Math.max(1, Math.min(totalPages, targetPage));
        if (targetPage !== currentPage) {
          currentPage = targetPage;
          searchMovies();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        }
      });
    }
  }

  // ✅ 初始化收藏评分星星
  function initCollectRatingStars() {
    const container = document.getElementById('collectRatingStars');
    if (!container) return;
    container.innerHTML = '';
    collectRating = 0;

    for (let i = 1; i <= 5; i++) {
      const star = document.createElement('span');
      star.className = 'star';
      star.setAttribute('data-value', i);
      star.innerHTML = '★';
      star.style.fontSize = '32px';
      star.style.cursor = 'pointer';
      star.style.display = 'inline-block';
      star.style.position = 'relative';

      updateCollectStarDisplay(star, i, collectRating);

      star.onclick = (function(starValue) {
        return function(e) {
          const rect = this.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const starWidth = rect.width;
          const isHalf = mouseX < starWidth / 2;
          let newRating = starValue;
          if (isHalf) {
            newRating = starValue - 0.5;
            if (newRating < 0) newRating = 0;
          }
          setCollectRating(newRating);
        };
      })(i);

      star.onmousemove = (function(starValue) {
        return function(e) {
          const rect = this.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const starWidth = rect.width;
          const isHalf = mouseX < starWidth / 2;
          const previewValue = isHalf ? starValue - 0.5 : starValue;
          previewCollectRating(previewValue);
        };
      })(i);

      star.onmouseleave = () => resetCollectStarsDisplay();

      container.appendChild(star);
    }
  }

  function updateCollectStarDisplay(star, starValue, rating) {
    star.classList.remove('half-star');
    if (rating >= starValue) {
      star.style.color = '#fbbf24';
    } else if (rating >= starValue - 0.5) {
      star.classList.add('half-star');
      star.style.color = '#d1d5db';
    } else {
      star.style.color = '#d1d5db';
    }
  }

  function previewCollectRating(previewValue) {
    const allStars = document.querySelectorAll('#collectRatingStars .star');
    allStars.forEach((star, index) => {
      const starValue = index + 1;
      star.classList.remove('half-star');
      if (previewValue >= starValue) {
        star.style.color = '#fbbf24';
      } else if (previewValue >= starValue - 0.5) {
        star.classList.add('half-star');
        star.style.color = '#d1d5db';
      } else {
        star.style.color = '#d1d5db';
      }
    });
    const ratingDisplay = document.getElementById('collectRatingDisplay');
    if (ratingDisplay) {
      ratingDisplay.textContent = `当前评分：${previewValue.toFixed(1)} 分`;
      ratingDisplay.style.color = '#f59e0b';
    }
  }

  function resetCollectStarsDisplay() {
    const allStars = document.querySelectorAll('#collectRatingStars .star');
    allStars.forEach((star, index) => {
      const starValue = index + 1;
      updateCollectStarDisplay(star, starValue, collectRating);
    });
    const ratingDisplay = document.getElementById('collectRatingDisplay');
    if (ratingDisplay) {
      ratingDisplay.textContent = `当前评分：${collectRating.toFixed(1)} 分`;
      ratingDisplay.style.color = '';
    }
  }

  function setCollectRating(value) {
    collectRating = value;
    document.getElementById('collectPersonalRating').value = value;
    const allStars = document.querySelectorAll('#collectRatingStars .star');
    allStars.forEach((star, index) => {
      const starValue = index + 1;
      updateCollectStarDisplay(star, starValue, collectRating);
    });
    const ratingDisplay = document.getElementById('collectRatingDisplay');
    if (ratingDisplay) {
      ratingDisplay.textContent = `当前评分：${collectRating.toFixed(1)} 分`;
    }
  }

  // ✅ 加载用户分类
  async function loadCategoriesForCollect() {
    try {
      const result = await movieAPI.getCategories();
      if (result.code === 200 && result.data) {
        categories = result.data;
        const select = document.getElementById('collectCategoryId');
        select.innerHTML = '<option value="">默认收藏</option>';
        categories.forEach(cat => {
          select.innerHTML += `<option value="${cat.categoryId}">${escapeHtml(cat.categoryName)}</option>`;
        });
      }
    } catch (error) {
      console.error('加载分类失败:', error);
    }
  }

  // ✅ 打开收藏模态框
  async function openCollectModal(movie) {
    // 重置表单
    collectRating = 0;
    setCollectRating(0);
    document.getElementById('collectWatchStatus').value = '想看';
    document.getElementById('collectPrivateReview').value = '';

    // 加载分类
    await loadCategoriesForCollect();

    // 设置电影预览信息
    document.getElementById('collectPoster').src = movie.poster_path ? 'https://image.tmdb.org/t/p/w200' + movie.poster_path : 'https://via.placeholder.com/80x120?text=No+Poster';
    document.getElementById('collectTitle').textContent = movie.title;
    document.getElementById('collectYear').textContent = movie.release_date ? movie.release_date.split('-')[0] : '年份未知';

    // 存储电影数据
    document.getElementById('collectTmdbId').value = movie.id;
    document.getElementById('collectMovieName').value = movie.title;
    document.getElementById('collectPosterUrl').value = movie.poster_path ? 'https://image.tmdb.org/t/p/w500' + movie.poster_path : '';
    document.getElementById('collectYearValue').value = movie.release_date ? movie.release_date.split('-')[0] : '';

    // 初始化评分星星
    initCollectRatingStars();

    // 显示模态框
    document.getElementById('collectModal').classList.add('show');
  }

  function closeCollectModal() {
    document.getElementById('collectModal').classList.remove('show');
    collectRating = 0;
  }

  // ✅ 确认收藏
  async function confirmCollect() {
    const tmdbId = document.getElementById('collectTmdbId').value;
    const movieName = document.getElementById('collectMovieName').value;
    const posterUrl = document.getElementById('collectPosterUrl').value;
    const year = document.getElementById('collectYearValue').value;
    const watchStatus = document.getElementById('collectWatchStatus').value;
    const privateReview = document.getElementById('collectPrivateReview').value;
    const categoryId = document.getElementById('collectCategoryId').value;
    const personalRating = collectRating;

    // 验证评分
    if (personalRating === 0) {
      showToast('请给电影评分（点击星星）', 'warning');
      return;
    }

    // 先获取电影详情（包含导演、类型等信息）
    showToast('正在获取电影信息...', 'info');

    try {
      const detailResponse = await fetch(`${API_BASE_URL}/tmdb/movie/${tmdbId}`);
      const fullMovieData = await detailResponse.json();

      // 解析导演
      let director = '';
      if (fullMovieData.credits && fullMovieData.credits.crew) {
        const directorObj = fullMovieData.credits.crew.find(person => person.job === 'Director');
        if (directorObj) {
          director = directorObj.name;
        }
      }

      // 解析类型
      let genre = '';
      if (fullMovieData.genres && fullMovieData.genres.length > 0) {
        genre = fullMovieData.genres.map(g => g.name).join('、');
      }

      // 解析地区
      let region = '';
      if (fullMovieData.production_countries && fullMovieData.production_countries.length > 0) {
        region = fullMovieData.production_countries[0].name;
      }

      const movieData = {
        tmdbId: parseInt(tmdbId),
        movieName: movieName,
        director: director,
        year: year ? parseInt(year) : null,
        posterUrl: posterUrl,
        genre: genre,
        region: region,
        personalRating: personalRating,
        watchStatus: watchStatus,
        privateReview: privateReview,
        categoryId: categoryId ? parseInt(categoryId) : null
      };

      const result = await movieAPI.addMovie(movieData);

      if (result.code === 200) {
        showToast('收藏成功！', 'success');
        closeCollectModal();
      } else {
        showToast(result.message || '收藏失败', 'error');
      }
    } catch (error) {
      console.error('收藏失败:', error);
      showToast('收藏失败，请重试', 'error');
    }
  }

  // 显示电影详情模态框
  async function showMovieDetail(movie) {
    const modal = document.createElement('div');
    modal.className = 'modal show';
    modal.style.display = 'flex';
    modal.innerHTML = `
      <div class="modal-content" style="max-width: 800px; max-height: 85vh; overflow-y: auto;">
        <div class="modal-header">
          <h3 class="modal-title">加载中...</h3>
          <button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button>
        </div>
        <div class="modal-body" style="text-align: center; padding: 60px;">
          <div class="spinner"></div> 正在加载电影详情...
        </div>
      </div>
    `;
    document.body.appendChild(modal);

    try {
      const response = await fetch(`${API_BASE_URL}/tmdb/movie/${movie.id}`);
      const fullMovieData = await response.json();

      let director = '未知';
      let cast = [];

      if (fullMovieData.credits && fullMovieData.credits.crew) {
        const directorObj = fullMovieData.credits.crew.find(person => person.job === 'Director');
        if (directorObj) {
          director = directorObj.name;
        }
      }

      if (fullMovieData.credits && fullMovieData.credits.cast) {
        cast = fullMovieData.credits.cast.slice(0, 5).map(actor => actor.name);
      }

      modal.innerHTML = `
        <div class="modal-content" style="max-width: 800px; max-height: 85vh; overflow-y: auto;">
          <div class="modal-header">
            <h3 class="modal-title">${escapeHtml(fullMovieData.title || movie.title)}</h3>
            <button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button>
          </div>
          <div class="modal-body" style="display: flex; gap: 20px; flex-wrap: wrap;">
            <img src="${fullMovieData.poster_path ? 'https://image.tmdb.org/t/p/w300' + fullMovieData.poster_path : (movie.poster_path ? 'https://image.tmdb.org/t/p/w300' + movie.poster_path : 'https://via.placeholder.com/200x300?text=No+Poster')}"
                 style="width: 200px; border-radius: var(--radius-md); object-fit: cover;">
            <div style="flex: 1; min-width: 200px;">
              <p><strong>原名：</strong> ${escapeHtml(fullMovieData.original_title || movie.title)}</p>
              <p><strong>上映日期：</strong> ${fullMovieData.release_date || movie.release_date || '未知'}</p>
              <p><strong>导演：</strong> ${escapeHtml(director)}</p>
              <p><strong>主演：</strong> ${cast.length > 0 ? cast.map(escapeHtml).join('、') : '暂无信息'}</p>
              <p><strong>评分：</strong> ${fullMovieData.vote_average ? fullMovieData.vote_average.toFixed(1) : (movie.vote_average ? movie.vote_average.toFixed(1) : '暂无')} / 10</p>
              <p><strong>时长：</strong> ${fullMovieData.runtime ? fullMovieData.runtime + '分钟' : '未知'}</p>
              <p><strong>类型：</strong> ${fullMovieData.genres ? fullMovieData.genres.map(g => g.name).join('、') : '未知'}</p>
              <p><strong>简介：</strong> ${escapeHtml(fullMovieData.overview || movie.overview || '暂无简介')}</p>
              <div style="margin-top: 20px;">
                <button class="btn btn-primary" id="collectFromDetailBtn">⭐ 收藏到我的电影</button>
              </div>
              <div id="detailCommentSection" style="margin-top: 20px;">
                <h4>用户评分</h4>
                <div id="detailAvgRating"></div>
                <button class="btn btn-secondary btn-sm" id="detailRateBtn">📝 发表评价</button>
                <div id="detailCommentsList" style="margin-top: 16px; max-height: 300px; overflow-y: auto;"></div>
              </div>
            </div>
          </div>
        </div>
      `;

      // 绑定收藏按钮事件
      modal.querySelector('#collectFromDetailBtn').addEventListener('click', () => {
        const token = localStorage.getItem('token');
        if (!token) {
          showLoginPrompt('收藏电影需要登录，请先登录', { type: 'collect', movieData: { id: fullMovieData.id, title: fullMovieData.title, poster_path: fullMovieData.poster_path, release_date: fullMovieData.release_date } });
        } else {
          modal.remove();
          openCollectModal({ id: fullMovieData.id, title: fullMovieData.title, poster_path: fullMovieData.poster_path, release_date: fullMovieData.release_date });
        }
      });

      // 加载评分和评论
      loadMovieRatingAndComments(fullMovieData.id, modal);

    } catch (error) {
      console.error('加载电影详情失败:', error);
      modal.innerHTML = `
        <div class="modal-content" style="max-width: 400px;">
          <div class="modal-header">
            <h3 class="modal-title">加载失败</h3>
            <button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button>
          </div>
          <div class="modal-body" style="text-align: center;">
            <p>加载电影详情失败，请检查网络连接</p>
            <button class="btn btn-primary" onclick="this.closest('.modal').remove()">关闭</button>
          </div>
        </div>
      `;
    }
  }

  async function loadMovieRatingAndComments(movieId, modal) {
    try {
      const result = await commentAPI.getAverageRatingByTMDBId(movieId);
      if (result.code === 200 && result.data && result.data.avgRating > 0) {
        modal.querySelector('#detailAvgRating').innerHTML = `
          <div class="average-rating">
            <span>综合评分：${renderStars(result.data.avgRating, 'small')} (${result.data.avgRating.toFixed(1)}分，${result.data.count}人评价)</span>
          </div>
        `;
      } else {
        modal.querySelector('#detailAvgRating').innerHTML = '<div>暂无评分</div>';
      }

      const commentsResult = await commentAPI.getCommentsByTMDBId(movieId);
      if (commentsResult.code === 200 && commentsResult.data) {
        renderDetailComments(commentsResult.data, modal);
      }
    } catch (error) {
      console.error('加载评分失败:', error);
    }
  }

  function renderDetailComments(comments, modal) {
    const container = modal.querySelector('#detailCommentsList');
    if (!comments || comments.length === 0) {
      container.innerHTML = '<div style="color: var(--gray-500);">暂无评价，成为第一个评价的人吧</div>';
      return;
    }

    container.innerHTML = comments.slice(0, 5).map(comment => `
      <div style="border-bottom: 1px solid var(--gray-200); padding: 12px 0;">
        <div style="display: flex; justify-content: space-between;">
          <span style="font-weight: 500;">${maskUsername(comment.username)}</span>
          <span style="font-size: 12px; color: var(--gray-400);">${formatDate(comment.createTime)}</span>
        </div>
        <div>${renderStars(comment.rating, 'small')}</div>
        <div style="font-size: 14px; margin-top: 8px;">${escapeHtml(comment.content)}</div>
      </div>
    `).join('');

    if (comments.length > 5) {
      container.innerHTML += `<div style="text-align: center; padding: 12px;"><a href="#" onclick="return false;" style="color: var(--primary);">查看全部 ${comments.length} 条评价</a></div>`;
    }
  }

  // 检查登录后是否需要执行待处理操作
  function checkPendingAction() {
    const pending = sessionStorage.getItem('pendingAction');
    const movieData = sessionStorage.getItem('pendingMovieData');
    if (pending) {
      const action = JSON.parse(pending);
      sessionStorage.removeItem('pendingAction');
      sessionStorage.removeItem('pendingMovieData');

      if (action.type === 'collect' && action.movieData) {
        openCollectModal(action.movieData);
      }
    }
  }

  setTimeout(checkPendingAction, 500);
</script>
</body>
